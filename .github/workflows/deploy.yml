name: DunbarHorizon CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create Firebase Config JSON
        run: |
          mkdir -p src/main/resources
          echo '${{ secrets.FIREBASE_CONFIG_JSON }}' > src/main/resources/dunbarhorizon-firebase.json

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: dunbarhorizon-backend
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Generate .env file
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_ACCESS_EXPIRATION: ${{ secrets.JWT_ACCESS_EXPIRATION }}
          JWT_REFRESH_EXPIRATION: ${{ secrets.JWT_REFRESH_EXPIRATION }}
          MYSQL_URL: ${{ secrets.MYSQL_URL }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          JPA_DDL_AUTO: ${{ secrets.JPA_DDL_AUTO }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          AWS_IMAGE_BUCKET: ${{ secrets.AWS_IMAGE_BUCKET }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          FRONTEND_BASE_URL: ${{ secrets.FRONTEND_BASE_URL }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: dunbarhorizon-backend
          IMAGE_TAG: latest
        run: |
          echo "JWT_SECRET_KEY=$JWT_SECRET_KEY" >> .env
          echo "JWT_ACCESS_EXPIRATION=$JWT_ACCESS_EXPIRATION" >> .env
          echo "JWT_REFRESH_EXPIRATION=$JWT_REFRESH_EXPIRATION" >> .env
          echo "MYSQL_URL=$MYSQL_URL" >> .env
          echo "MYSQL_PASSWORD=$MYSQL_PASSWORD" >> .env
          echo "DB_USERNAME=$DB_USERNAME" >> .env
          echo "JPA_DDL_AUTO=$JPA_DDL_AUTO" >> .env
          echo "NEO4J_URI=$NEO4J_URI" >> .env
          echo "NEO4J_PASSWORD=$NEO4J_PASSWORD" >> .env
          echo "NEO4J_USERNAME=$NEO4J_USERNAME" >> .env
          echo "MONGO_URI=$MONGO_URI" >> .env
          echo "OAUTH_GOOGLE_CLIENT_ID=$OAUTH_GOOGLE_CLIENT_ID" >> .env
          echo "OAUTH_GOOGLE_CLIENT_SECRET=$OAUTH_GOOGLE_CLIENT_SECRET" >> .env
          echo "SMTP_USER=$SMTP_USER" >> .env   
          echo "SMTP_PASSWORD=$SMTP_PASSWORD" >> .env
          echo "AWS_IMAGE_BUCKET=$AWS_IMAGE_BUCKET" >> .env
          echo "AWS_S3_REGION=ap-northeast-2" >> .env
          echo "APP_BASE_URL=$APP_BASE_URL" >> .env
          echo "FRONTEND_BASE_URL=$FRONTEND_BASE_URL" >> .env
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> .env
          echo "ECR_REPOSITORY=$ECR_REPOSITORY" >> .env
          echo "IMAGE_TAG=$IMAGE_TAG" >> .env

      - name: Zip deployment files
        run: zip -r $GITHUB_SHA.zip appspec.yml docker-compose.yml scripts/ .env

      - name: Upload to S3
        run: aws s3 cp --region ap-northeast-2 ./$GITHUB_SHA.zip s3://${{ secrets.AWS_DEPLOY_BUCKET }}/$GITHUB_SHA.zip

      - name: Deploy with AWS CodeDeploy
        run: |
          aws deploy create-deployment \
          --application-name dunbarhorizon-deploy-app \
          --deployment-config-name CodeDeployDefault.AllAtOnce \
          --deployment-group-name dunbarhorizon-deploy-group \
          --s3-location bucket=${{ secrets.AWS_DEPLOY_BUCKET }},bundleType=zip,key=$GITHUB_SHA.zip