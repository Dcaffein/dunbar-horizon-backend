app.frontend.base-url=http://localhost:3000

spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=${NEO4J_PASSWORD}
spring.data.neo4j.database=gooroom

logging.level.org.springframework.data.neo4j.cypher=DEBUG
logging.level.org.neo4j.driver=INFO

spring.datasource.url=jdbc:mariadb://localhost:3306/gooroom_db?serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${MARIADB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

spring.data.mongodb.uri=mongodb://localhost:27017/gooroom_notification
spring.data.mongodb.auto-index-creation=true