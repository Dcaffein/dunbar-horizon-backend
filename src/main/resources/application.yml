spring:
  application:
    name: dunbarhorizon

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH_GOOGLE_CLIENT_ID}
            client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USER}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # RDB (MySQL)
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/dunbar_horizon?serverTimezone=UTC&characterEncoding=UTF-8}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  # Graph DB (Neo4j)
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD}
  data:
    neo4j:
      database: neo4j

    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:2717/dunbar_horizon_notification}
      auto-index-creation: true

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_S3_REGION:ap-northeast-2}
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

jwt:
  secret: ${JWT_SECRET_KEY}
  access-expiration-seconds: ${JWT_ACCESS_EXPIRATION}
  refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION:604800}

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.springframework.data.neo4j.cypher: ${LOG_LEVEL_NEO4J:DEBUG}
    org.neo4j.driver: INFO