version: '3.8'

services:
  dunbarhorizon-api-server:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
    container_name: dunbarhorizon-api-server
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - dunbar-network

networks:
  dunbar-network:
    external: true